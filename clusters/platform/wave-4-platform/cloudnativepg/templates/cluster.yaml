apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-postgres
  namespace: cloudnativepg
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 3
  enableSuperuserAccess: true

  storage:
    size: 20Gi
    storageClass: proxmox-lvm

  monitoring:
    enablePodMonitor: true
