authelia:
  domain: the-lab.zone

  secret:
    existingSecret: authelia-secrets
    additionalSecrets:
      authelia-oidc-jwks:
        items:
          - key: private.pem
            path: private.pem

  ingress:
    enabled: false

  configMap:
    enabled: true

    theme: dark

    log:
      level: info
      format: json

    telemetry:
      metrics:
        enabled: true
        port: 9959
        serviceMonitor:
          enabled: true

    authentication_backend:
      password_reset:
        disable: false
      file:
        enabled: true
        path: /config/users.yaml
        password:
          algorithm: bcrypt
          bcrypt:
            cost: 12

    access_control:
      default_policy: deny
      rules:
        - domain: auth.infra.the-lab.zone
          policy: bypass

        - domain: auth.infra.the-lab.zone
          resources:
            - "^/api/.*$"
            - "^/oauth2/.*$"
          policy: bypass

        - domain: argocd.platform.the-lab.zone
          subject:
            - "group:sre"
          policy: two_factor

        - domain: "*.platform.the-lab.zone"
          policy: one_factor

        - domain: "*.infra.the-lab.zone"
          policy: one_factor

    session:
      name: authelia_session
      domain: the-lab.zone
      same_site: lax
      expiration: 1h
      inactivity: 5m
      remember_me: 1M
      cookies:
        - domain: the-lab.zone
          authelia_url: https://auth.infra.the-lab.zone
          default_redirection_url: https://auth.infra.the-lab.zone
      redis:
        enabled: true
        host: valkey-primary.valkey.svc.cluster.local
        port: 6379
        database_index: 0
        maximum_active_connections: 8
        minimum_idle_connections: 0

    storage:
      postgres:
        enabled: true
        address: tcp://platform-postgres-rw.cloudnativepg.svc.cluster.local:5432
        database: authelia
        username: authelia
        tls:
          skip_verify: true

    notifier:
      disable_startup_check: false
      filesystem:
        enabled: true
        filename: /tmp/authelia-notifications.log

    identity_providers:
      oidc:
        jwks:
          - key_id: main
            algorithm: RS256
            use: sig
            key:
              path: /secrets/authelia-oidc-jwks/private.pem
        cors:
          endpoints:
            - authorization
            - token
            - revocation
            - introspection
            - userinfo
          allowed_origins_from_client_redirect_uris: true
        clients:
          - client_id: argocd
            client_name: ArgoCD
            client_secret:
              path: /secrets/authelia-secrets/AUTHELIA_OIDC_CLIENT_ARGOCD_SECRET
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://argocd.platform.the-lab.zone/api/dex/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signed_response_alg: none

          - client_id: grafana
            client_name: Grafana
            client_secret:
              path: /secrets/authelia-secrets/AUTHELIA_OIDC_CLIENT_GRAFANA_SECRET
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://grafana.infra.the-lab.zone/login/generic_oauth
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signed_response_alg: none

          - client_id: forgejo
            client_name: Forgejo
            client_secret:
              path: /secrets/authelia-secrets/AUTHELIA_OIDC_CLIENT_FORGEJO_SECRET
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://git.infra.the-lab.zone/user/oauth2/authelia/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signed_response_alg: none

  # TODO: replace bcrypt hash with real value
  # Generate with: htpasswd -nbBC 12 "" password | tr -d ':\n' | sed 's/$2y/$2b/'
  userDatabase:
    enabled: true
    content:
      users:
        fwfurtado:
          displayname: Felipe
          password: "$2b$12$REPLACE_WITH_REAL_BCRYPT_HASH"
          email: fwfurtado@gmail.com
          groups:
            - sre
            - admins

  persistence:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
