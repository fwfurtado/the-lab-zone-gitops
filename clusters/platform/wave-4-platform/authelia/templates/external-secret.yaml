---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: authelia-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTHELIA_STORAGE_POSTGRES_PASSWORD
      remoteRef:
        key: "Authelia Database/password"

    - secretKey: AUTHELIA_SESSION_REDIS_PASSWORD
      remoteRef:
        key: "Valkey/password"

    - secretKey: AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
      remoteRef:
        key: "Authelia/oidc_hmac_secret"

    - secretKey: AUTHELIA_JWT_SECRET
      remoteRef:
        key: "Authelia/jwt_secret"

    - secretKey: AUTHELIA_OIDC_CLIENT_ARGOCD_SECRET
      remoteRef:
        key: "Argo CD/client-secret"

    - secretKey: AUTHELIA_OIDC_CLIENT_GRAFANA_SECRET
      remoteRef:
        key: "Grafana/oidc_client_secret"

    - secretKey: AUTHELIA_OIDC_CLIENT_FORGEJO_SECRET
      remoteRef:
        key: "Authelia/forgejo_oidc_client_secret"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-oidc-jwks
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: authelia-oidc-jwks
    creationPolicy: Owner
  data:
    - secretKey: private.pem
      remoteRef:
        key: "Authelia/oidc_jwks_private_key.pem"
