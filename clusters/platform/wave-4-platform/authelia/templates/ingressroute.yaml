apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia
  namespace: authelia
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.infra.the-lab.zone`)
      kind: Rule
      services:
        - name: authelia
          port: 80
  tls:
    secretName: infra-wildcard-tls
