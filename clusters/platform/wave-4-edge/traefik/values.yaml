# Serviços externos - adicione itens para criar novos proxies
# name: identificador (gera recursos *-external)
# host: FQDN (ex: proxmox.infra.the-lab.zone)
# ip: IP do serviço na rede
# port: porta do serviço
# scheme: https (usa ServersTransport) ou http
externalServices:
  - name: proxmox
    host: proxmox.infra.the-lab.zone
    ip: "10.40.0.200"
    port: 8006
    scheme: https
  - name: nas
    host: nas.infra.the-lab.zone
    ip: "10.40.0.4"
    port: 443
    scheme: https
  - name: haos
    host: haos.infra.the-lab.zone
    ip: "192.168.20.2"
    port: 8123
    scheme: http
  - name: aistor
    host: aistor.infra.the-lab.zone
    ip: "10.40.1.20"
    port: 9002
    scheme: http
  - name: aistor-s3
    host: s3.aistor.infra.the-lab.zone
    ip: "10.40.1.20"
    port: 9000
    scheme: http
    tlsSecretName: aistor-infra-wildcard-tls

traefik:
  deployment:
    replicas: 2

  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "10.40.2.1"
      metallb.universe.tf/address-pool: platform-infra-pool

  ports:
    web:
      port: 8000
      exposedPort: 80
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
    websecure:
      port: 8443
      exposedPort: 443
      http:
        tls:
          enabled: true
    ssh:
      port: 2222
      exposedPort: 22
      protocol: TCP
      expose:
        default: true

  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true
    kubernetesIngress:
      enabled: true
      allowEmptyServices: true

  ingressRoute:
    dashboard:
      enabled: false

  logs:
    general:
      level: INFO
      format: json
    access:
      enabled: true

  tracing:
    otlp:
      http:
        endpoint: http://vtraces.monitoring.svc.cluster.local:10428/insert/opentelemetry/v1/traces

  metrics:
    prometheus:
      service:
        enabled: true
      serviceMonitor:
        enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
