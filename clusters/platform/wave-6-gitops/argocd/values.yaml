argo-cd:
  controller:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  server:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  repoServer:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  dex:
    enabled: true
  configs:
    params:
      server.insecure: true
      server.login.prompt.enabled: false
    cm:
      admin.enabled: true
      url: https://argocd.platform.the-lab.zone
      # Permite sync de Endpoints customizados (ex: external-services no Traefik).
      # Por padrão ArgoCD 3.x exclui Endpoints; mantemos só EndpointSlice excluído.
      resource.exclusions: |
        - apiGroups:
            - discovery.k8s.io
          kinds:
            - EndpointSlice
          clusters:
            - "*"
      dex.config: |
        connectors:
          - type: oidc
            id: authelia
            name: Authelia
            config:
              issuer: https://auth.infra.the-lab.zone
              clientID: argocd
              clientSecret: $argocd-oidc:dex.authelia.clientSecret
              insecureEnableGroups: true
              getUserInfo: true
              userNameKey: preferred_username
              scopes:
                - openid
                - profile
                - email
                - groups
    rbac:
      policy.default: role:readonly
      policy.csv: |
        g, sres, role:admin
      scopes: "[groups, email]"
