---
# Syncs the Authelia OIDC client secret from 1Password into a Secret
# that ArgoCD's Dex connector references via $argocd-oidc:dex.authelia.clientSecret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: argocd-oidc
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: dex.authelia.clientSecret
      remoteRef:
        key: "Argo CD/client-secret"
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
