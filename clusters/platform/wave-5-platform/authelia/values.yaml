authelia:
  domain: the-lab.zone

  secret:
    existingSecret: authelia-secrets
    additionalSecrets:
      authelia-oidc-jwks:
        items:
          - key: private.pem
            path: private.pem
      authelia-oidc-clients: {}

  ingress:
    enabled: false

  identity_providers:
    oidc:
      enabled: true

  configMap:
    enabled: true

    theme: dark

    log:
      level: info
      format: json

    telemetry:
      metrics:
        enabled: true
        port: 9959
        serviceMonitor:
          enabled: true

    authentication_backend:
      password_reset:
        disable: false
      file:
        enabled: true
        path: /config/users.yaml
        password:
          algorithm: bcrypt
          bcrypt:
            cost: 12

    access_control:
      default_policy: deny
      rules:
        - domain: auth.infra.the-lab.zone
          policy: bypass

        - domain: auth.infra.the-lab.zone
          resources:
            - "^/api/.*$"
            - "^/oauth2/.*$"
          policy: bypass

        - domain: argocd.platform.the-lab.zone
          subject:
            - "group:sre"
          policy: two_factor

        - domain: "*.platform.the-lab.zone"
          policy: one_factor

        - domain: "*.infra.the-lab.zone"
          policy: one_factor

    session:
      name: authelia_session
      domain: the-lab.zone
      same_site: lax
      expiration: 1h
      inactivity: 5m
      remember_me: 1M
      cookies:
        - domain: the-lab.zone
          subdomain: auth.infra
      redis:
        enabled: true
        host: valkey-primary.valkey.svc.cluster.local
        port: 6379
        database_index: 0
        maximum_active_connections: 8
        minimum_idle_connections: 0

    storage:
      postgres:
        enabled: true
        address: tcp://platform-postgres-rw.cloudnativepg.svc.cluster.local:5432
        database: authelia
        username: authelia
        tls:
          skip_verify: true

    notifier:
      disable_startup_check: false
      filesystem:
        enabled: true
        filename: /tmp/authelia-notifications.log

    identity_providers:
      oidc:
        enabled: true
        jwks:
          - key_id: main
            algorithm: RS256
            use: sig
            key:
              path: /secrets/authelia-oidc-jwks/private.pem
        claims_policies:
          default:
            id_token:
              - groups
              - email
              - preferred_username
              - name
        cors:
          endpoints:
            - authorization
            - token
            - revocation
            - introspection
            - userinfo
          allowed_origins_from_client_redirect_uris: true
        clients:
          - client_id: argocd
            client_name: ArgoCD
            consent_mode: implicit
            client_secret:
              path: /secrets/authelia-oidc-clients/AUTHELIA_OIDC_CLIENT_ARGOCD_SECRET
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://argocd.platform.the-lab.zone/api/dex/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signed_response_alg: none

          - client_id: grafana
            client_name: Grafana
            consent_mode: implicit
            claims_policy: default
            client_secret:
              path: /secrets/authelia-oidc-clients/AUTHELIA_OIDC_CLIENT_GRAFANA_SECRET
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://grafana.infra.the-lab.zone/login/generic_oauth
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signed_response_alg: none

          - client_id: forgejo
            client_name: Forgejo
            consent_mode: implicit
            client_secret:
              path: /secrets/authelia-oidc-clients/AUTHELIA_OIDC_CLIENT_FORGEJO_SECRET
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://git.infra.the-lab.zone/user/oauth2/authelia/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signed_response_alg: none

          - client_id: coder
            client_name: Coder
            consent_mode: implicit
            claims_policy: default
            client_secret:
              path: /secrets/authelia-oidc-clients/AUTHELIA_OIDC_CLIENT_CODER_SECRET
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://coder.platform.the-lab.zone/api/v2/users/oidc/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signed_response_alg: none

  # Users loaded from ExternalSecret (authelia-users) via Infisical key authelia-users-yaml.
  # In Infisical, create secret "authelia-users-yaml" with full users.yaml content, e.g.:
  #   users:
  #     fwfurtado:
  #       displayname: Felipe
  #       password: "$2b$12$..."  # htpasswd -nbBC 12 "" yourpassword | tr -d ':\n' | sed 's/$2y/$2b/'
  #       email: fwfurtado@gmail.com
  #       groups: [sre, admins]
  userDatabase:
    enabled: false

  pod:
    extraVolumes:
      - name: authelia-users
        secret:
          secretName: authelia-users
    extraVolumeMounts:
      - name: authelia-users
        mountPath: /config/users.yaml
        subPath: users.yaml

  persistence:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
