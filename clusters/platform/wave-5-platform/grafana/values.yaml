grafana:
  deploymentStrategy:
    type: Recreate
    rollingUpdate: null

  serviceMonitor:
    enabled: true

  plugins:
    - victoriametrics-metrics-datasource
    - victoriametrics-logs-datasource

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      skipReload: true
      provider:
        name: default
        foldersFromFilesStructure: false

  admin:
    existingSecret: grafana-credentials
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    size: 5Gi
    storageClass: proxmox-lvm

  envFromSecrets:
    - name: grafana-credentials

  grafana.ini:
    server:
      root_url: https://grafana.infra.the-lab.zone
    auth:
      oauth_auto_login: false
    auth.generic_oauth:
      enabled: true
      name: Authelia
      icon: signin
      client_id: grafana
      client_secret: $__env{GRAFANA_OAUTH_SECRET}
      scopes: openid profile email groups
      auth_url: https://auth.infra.the-lab.zone/api/oidc/authorization
      token_url: https://auth.infra.the-lab.zone/api/oidc/token
      api_url: https://auth.infra.the-lab.zone/api/oidc/userinfo
      groups_attribute_path: groups
      role_attribute_path: contains(groups, 'admins') && 'Admin' || 'Viewer'
      skip_org_role_sync: false
      allow_assign_grafana_admin: true

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          url: http://vmsingle-vm-stack.monitoring.svc.cluster.local:8428
          isDefault: true
          access: proxy
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          url: http://vlogs.monitoring.svc.cluster.local:9428
          access: proxy
        - name: VictoriaTraces
          type: jaeger
          url: http://vtraces.monitoring.svc.cluster.local:10428
          access: proxy

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: community
          orgId: 1
          folder: Community
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/community

  dashboards:
    community:
      cert-manager:
        gnetId: 20842
        revision: 3
        datasource: VictoriaMetrics
      traefik:
        gnetId: 17347
        revision: 10
        datasource: VictoriaMetrics
      coredns:
        gnetId: 14981
        revision: 18
        datasource: VictoriaMetrics
      argocd:
        gnetId: 14584
        revision: 1
        datasource: VictoriaMetrics
      velero:
        gnetId: 11055
        revision: 2
        datasource: VictoriaMetrics
      minio:
        gnetId: 13502
        revision: 26
        datasource: VictoriaMetrics
      valkey:
        gnetId: 12776
        revision: 3
        datasource: VictoriaMetrics
      metallb:
        gnetId: 20162
        revision: 1
        datasource: VictoriaMetrics
      external-dns:
        gnetId: 15038
        revision: 3
        datasource: VictoriaMetrics
      external-secrets:
        gnetId: 21640
        revision: 1
        datasource: VictoriaMetrics

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
