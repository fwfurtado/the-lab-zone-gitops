apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zot
  namespace: zot
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`registry.infra.the-lab.zone`)
      kind: Rule
      services:
        - name: zot
          port: 5000
  tls:
    secretName: infra-wildcard-tls
