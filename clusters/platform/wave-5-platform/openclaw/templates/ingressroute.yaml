apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: openclaw
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openclaw.platform.the-lab.zone`)
      kind: Rule
      services:
        - name: openclaw
          port: 18789
  tls:
    secretName: platform-wildcard-tls
