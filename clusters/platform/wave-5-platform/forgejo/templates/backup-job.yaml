apiVersion: batch/v1
kind: CronJob
metadata:
  name: forgejo-backup
  namespace: forgejo
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumes:
            - name: forgejo-data
              persistentVolumeClaim:
                claimName: gitea-shared-storage
            - name: tmp
              emptyDir: {}
            - name: backup-dir
              emptyDir: {}
          initContainers:
            - name: dump
              image: codeberg.org/forgejo/forgejo:10.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  export FORGEJO_WORK_DIR=/tmp/forgejo
                  export GITEA_WORK_DIR=/tmp/forgejo

                  mkdir -p /tmp/forgejo/custom/conf \
                            /tmp/forgejo/data/tmp/package-upload

                  cat > /tmp/forgejo/custom/conf/app.ini <<EOINI
                  [security]
                  INSTALL_LOCK = true

                  [database]
                  DB_TYPE = postgres
                  HOST = platform-postgres-rw.cloudnativepg.svc.cluster.local:5432
                  NAME = forgejo
                  USER = forgejo
                  PASSWD = ${DB_PASSWORD}

                  [storage]
                  STORAGE_TYPE = minio
                  MINIO_ENDPOINT = minio.minio.svc.cluster.local:9000
                  MINIO_BUCKET = forgejo
                  MINIO_ACCESS_KEY_ID = ${MINIO_ACCESS_KEY}
                  MINIO_SECRET_ACCESS_KEY = ${MINIO_SECRET_KEY}
                  MINIO_USE_SSL = false
                  EOINI

                  BACKUP_FILE="/backup/forgejo-backup-$(date +%Y%m%dT%H%M%S).zip"

                  echo "Iniciando dump do Forgejo..."
                  forgejo dump \
                    --config /tmp/forgejo/custom/conf/app.ini \
                    --work-path /tmp/forgejo \
                    --file "$BACKUP_FILE" \
                    --skip-log \
                    --type zip

                  echo "Dump concluído: $(basename $BACKUP_FILE)"
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: db-password
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-secret-key
              volumeMounts:
                - name: forgejo-data
                  mountPath: /data
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: backup-dir
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          containers:
            - name: upload
              image: minio/mc:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "Configurando alias MinIO..."
                  mc alias set dest http://minio.minio.svc.cluster.local:9000 \
                    "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

                  echo "Fazendo upload para forgejo-backups..."
                  mc cp /backup/*.zip "dest/forgejo-backups/"

                  echo "Removendo backups com mais de 30 dias..."
                  mc rm --recursive --force --older-than 720h \
                    dest/forgejo-backups/ || true

                  echo "Upload concluído!"
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-secret-key
              volumeMounts:
                - name: backup-dir
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
