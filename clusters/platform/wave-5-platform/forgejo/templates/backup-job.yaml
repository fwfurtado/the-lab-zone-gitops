apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-backup-storage
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: proxmox-lvm
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: forgejo-backup
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: forgejo
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: gitea-shared-storage
            - name: backup
              persistentVolumeClaim:
                claimName: forgejo-backup-storage
          initContainers:
            - name: dump
              image: code.forgejo.org/forgejo/forgejo:9.0.1-rootless
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "Removendo dump anterior..."
                  rm -f /backup/forgejo-dump.tar.zst

                  mkdir -p /tmp/gitea

                  echo "Iniciando forgejo dump..."
                  forgejo dump \
                    --config /data/gitea/conf/app.ini \
                    --work-path /data \
                    --type tar.zst \
                    --file /backup/forgejo-dump.tar.zst

                  ls -lh /backup/forgejo-dump.tar.zst
                  echo "Dump concluído!"
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backup
                  mountPath: /backup
              env:
                - name: GITEA_WORK_DIR
                  value: /data
                - name: GITEA_APP_INI
                  value: /data/gitea/conf/app.ini
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi
          containers:
            - name: upload
              image: minio/mc:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  BACKUP_DATE=$(date +%Y%m%dT%H%M%S)

                  echo "Configurando MinIO..."
                  mc alias set dest http://minio.minio.svc.cluster.local:9000 \
                    "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

                  echo "Fazendo upload do dump..."
                  mc cp --disable-multipart \
                    /backup/forgejo-dump.tar.zst \
                    "dest/forgejo-backups/forgejo-dump-${BACKUP_DATE}.tar.zst"

                  echo "Removendo dumps com mais de 30 dias..."
                  mc rm --recursive --force --older-than 720h \
                    dest/forgejo-backups/ || true

                  echo "Upload concluído!"
              volumeMounts:
                - name: backup
                  mountPath: /backup
                  readOnly: true
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-secret-key
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
