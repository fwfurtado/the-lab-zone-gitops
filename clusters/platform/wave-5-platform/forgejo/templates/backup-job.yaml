apiVersion: batch/v1
kind: CronJob
metadata:
  name: forgejo-backup
  namespace: "{{ .Release.Namespace }}"
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup-dir
              emptyDir:
                sizeLimit: 5Gi
          containers:
            - name: backup
              image: minio/mc:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  apk add --no-cache curl jq git 2>/dev/null || true

                  FORGEJO_URL="http://forgejo-http.forgejo.svc.cluster.local:3000"
                  BACKUP_DATE=$(date +%Y%m%dT%H%M%S)
                  BACKUP_DIR="/backup/$BACKUP_DATE"
                  mkdir -p "$BACKUP_DIR"

                  echo "Configurando MinIO..."
                  mc alias set dest http://minio.minio.svc.cluster.local:9000 \
                    "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

                  echo "Buscando lista de repositórios..."
                  PAGE=1
                  REPOS=""
                  while true; do
                    RESULT=$(curl -sf \
                      -H "Authorization: token $FORGEJO_TOKEN" \
                      "$FORGEJO_URL/api/v1/repos/search?limit=50&page=$PAGE" \
                      | jq -r '.data[].full_name')
                    [ -z "$RESULT" ] && break
                    REPOS="$REPOS $RESULT"
                    PAGE=$((PAGE + 1))
                  done

                  echo "Repos encontrados: $REPOS"

                  for REPO in $REPOS; do
                    echo "Clonando $REPO..."
                    OWNER=$(echo "$REPO" | cut -d'/' -f1)
                    NAME=$(echo "$REPO" | cut -d'/' -f2)

                    git clone --mirror \
                      "http://$FORGEJO_TOKEN@forgejo-http.forgejo.svc.cluster.local:3000/$REPO.git" \
                      "$BACKUP_DIR/$OWNER-$NAME.git" || {
                        echo "WARN: falha ao clonar $REPO, pulando..."
                        continue
                      }

                    # Compacta o bundle
                    tar -czf "$BACKUP_DIR/$OWNER-$NAME.tar.gz" \
                      -C "$BACKUP_DIR" "$OWNER-$NAME.git"
                    rm -rf "$BACKUP_DIR/$OWNER-$NAME.git"

                    echo "  $REPO → $OWNER-$NAME.tar.gz"
                  done

                  echo "Fazendo upload para forgejo-backups/$BACKUP_DATE/..."
                  mc cp --recursive "$BACKUP_DIR/" \
                    "dest/forgejo-backups/$BACKUP_DATE/"

                  echo "Removendo backups com mais de 30 dias..."
                  mc rm --recursive --force --older-than 720h \
                    dest/forgejo-backups/ || true

                  echo "Backup concluído!"
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-secret-key
                - name: FORGEJO_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-backup-token
                      key: token
              volumeMounts:
                - name: backup-dir
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
