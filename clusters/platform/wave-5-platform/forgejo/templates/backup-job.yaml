apiVersion: batch/v1
kind: CronJob
metadata:
  name: forgejo-backup
  namespace: "{{ .Release.Namespace }}"
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup-dir
              emptyDir:
                sizeLimit: 5Gi
          initContainers:
            - name: install-mc
              image: alpine:3.19
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl git jq
                  curl -sSf https://dl.min.io/client/mc/release/linux-amd64/mc \
                    -o /backup/mc
                  chmod +x /backup/mc
              volumeMounts:
                - name: backup-dir
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          containers:
            - name: backup
              image: alpine:3.19
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  apk add --no-cache curl git jq 2>/dev/null

                  MC="/backup/mc"
                  FORGEJO_URL="http://forgejo-http.forgejo.svc.cluster.local:3000"
                  BACKUP_DATE=$(date +%Y%m%dT%H%M%S)
                  REPOS_DIR="/backup/repos/$BACKUP_DATE"
                  mkdir -p "$REPOS_DIR"

                  echo "Configurando MinIO..."
                  $MC alias set dest http://minio.minio.svc.cluster.local:9000 \
                    "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

                  echo "Buscando lista de repositórios..."
                  PAGE=1
                  REPOS=""
                  while true; do
                    RESULT=$(curl -sf \
                      -H "Authorization: token $FORGEJO_TOKEN" \
                      "$FORGEJO_URL/api/v1/repos/search?limit=50&page=$PAGE" \
                      | jq -r '.data[].full_name')
                    [ -z "$RESULT" ] && break
                    REPOS="$REPOS
                  $RESULT"
                    PAGE=$((PAGE + 1))
                  done

                  echo "Repositórios encontrados:"
                  echo "$REPOS"

                  echo "$REPOS" | while IFS= read -r REPO; do
                    [ -z "$REPO" ] && continue
                    OWNER=$(echo "$REPO" | cut -d'/' -f1)
                    NAME=$(echo "$REPO" | cut -d'/' -f2)

                    echo "Clonando $REPO..."
                    git clone --mirror \
                      "http://$FORGEJO_TOKEN@forgejo-http.forgejo.svc.cluster.local:3000/$REPO.git" \
                      "$REPOS_DIR/$OWNER-$NAME.git" || {
                        echo "WARN: falha ao clonar $REPO, pulando..."
                        continue
                      }

                    tar -czf "$REPOS_DIR/$OWNER-$NAME.tar.gz" \
                      -C "$REPOS_DIR" "$OWNER-$NAME.git"
                    rm -rf "$REPOS_DIR/$OWNER-$NAME.git"
                    echo "  OK: $OWNER-$NAME.tar.gz"
                  done

                  echo "Fazendo upload para forgejo-backups/$BACKUP_DATE/..."
                  $MC cp --recursive "$REPOS_DIR/" \
                    "dest/forgejo-backups/$BACKUP_DATE/"

                  echo "Removendo backups com mais de 30 dias..."
                  $MC rm --recursive --force --older-than 720h \
                    dest/forgejo-backups/ || true

                  echo "Backup concluído!"
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-credentials
                      key: minio-secret-key
                - name: FORGEJO_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-backup-token
                      key: token
              volumeMounts:
                - name: backup-dir
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
