---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-credentials
  namespace: "{{ .Release.Namespace }}"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: forgejo-credentials
    creationPolicy: Owner
    template:
      data:
        db-password: |-
          {{ "{{ .dbPassword }}" }}
        minio-access-key: |-
          {{ "{{ .minioAccessKey }}" }}
        minio-secret-key: |-
          {{ "{{ .minioSecretKey }}" }}
        redis-url: |-
          redis://:{{ "{{ .valkeyPassword }}" }}@valkey-primary.valkey.svc.cluster.local:6379/0
        redis-session-url: |-
          redis://:{{ "{{ .valkeyPassword }}" }}@valkey-primary.valkey.svc.cluster.local:6379/1
        redis-queue-url: |-
          redis://:{{ "{{ .valkeyPassword }}" }}@valkey-primary.valkey.svc.cluster.local:6379/2
        runner-secret: |-
          {{ "{{ .runnerSecret }}" }}
  data:
    - secretKey: dbPassword
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /database/forgejo/password
    - secretKey: minioAccessKey
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /minio/root-user
    - secretKey: minioSecretKey
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /minio/root-password
    - secretKey: valkeyPassword
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /valkey/password
    - secretKey: runnerSecret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /forgejo/runner-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-backup-token
  namespace: "{{ .Release.Namespace }}"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: forgejo-backup-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /forgejo/backup-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-backup-credentials
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: forgejo-backup-credentials
    creationPolicy: Owner
  data:
    - secretKey: minio-access-key
      remoteRef:
        key: /minio/root-user
    - secretKey: minio-secret-key
      remoteRef:
        key: /minio/root-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-backup-token
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: forgejo-backup-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: /forgejo/backup-token
