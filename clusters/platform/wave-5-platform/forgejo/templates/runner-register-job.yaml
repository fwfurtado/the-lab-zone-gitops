{{ $name := "forgejo-runner-register" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: forgejo-runner
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: forgejo-runner
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $name }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: register
          image: codeberg.org/forgejo/forgejo:10.0
          command:
            - sh
            - -c
            - |
              set -e
              export FORGEJO_WORK_DIR=/tmp/forgejo
              export GITEA_WORK_DIR=/tmp/forgejo
              mkdir -p /tmp/forgejo/custom/conf /tmp/forgejo/data/tmp/package-upload

              cat > /tmp/forgejo/custom/conf/app.ini <<EOINI
              [security]
              INSTALL_LOCK = true

              [database]
              DB_TYPE = postgres
              HOST = platform-postgres-rw.cloudnativepg.svc.cluster.local:5432
              NAME = forgejo
              USER = forgejo
              PASSWD = ${DB_PASSWORD}
              EOINI

              echo "Generating runner token..."
              TOKEN=$(forgejo --config /tmp/forgejo/custom/conf/app.ini \
                --work-path /tmp/forgejo \
                forgejo-cli actions generate-runner-token 2>/dev/null | tail -1)

              if [ -z "$TOKEN" ]; then
                echo "Failed to generate runner token"
                exit 1
              fi

              echo "Runner token generated successfully"

              echo "Registering runner..."
              forgejo --config /tmp/forgejo/custom/conf/app.ini \
                --work-path /tmp/forgejo \
                forgejo-cli actions register \
                --secret "$TOKEN" \
                --name lab-runner \
                --labels "docker"

              echo "Saving runner token to secret in forgejo-runner namespace..."
              cat > /tmp/secret.json <<EOJSON
              {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": {
                  "name": "forgejo-runner-credentials",
                  "namespace": "forgejo-runner"
                },
                "type": "Opaque",
                "stringData": {
                  "runner-secret": "$TOKEN"
                }
              }
              EOJSON

              # Install kubectl
              wget -qO /tmp/kubectl "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl"
              chmod +x /tmp/kubectl

              /tmp/kubectl apply -f /tmp/secret.json
              echo "Runner token saved!"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo-credentials
                  key: db-password
  backoffLimit: 3
