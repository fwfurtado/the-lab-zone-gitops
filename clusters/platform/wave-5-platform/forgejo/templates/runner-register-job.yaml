apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-runner-register
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: register
          image: codeberg.org/forgejo/forgejo:10.0
          command:
            - sh
            - -c
            - |
              export FORGEJO_WORK_DIR=/tmp/forgejo
              export GITEA_WORK_DIR=/tmp/forgejo
              mkdir -p /tmp/forgejo/custom/conf /tmp/forgejo/data/tmp/package-upload
              cat > /tmp/forgejo/custom/conf/app.ini <<EOINI
              [security]
              INSTALL_LOCK = true

              [database]
              DB_TYPE = postgres
              HOST = platform-postgres-rw.cloudnativepg.svc.cluster.local:5432
              NAME = forgejo
              USER = forgejo
              PASSWD = ${DB_PASSWORD}
              EOINI
              forgejo --config /tmp/forgejo/custom/conf/app.ini --work-path /tmp/forgejo forgejo-cli actions register \
                --secret "$RUNNER_SECRET" \
                --name lab-runner \
                --labels "docker"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo-credentials
                  key: db-password
            - name: RUNNER_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-credentials
                  key: runner-secret
  backoffLimit: 3
