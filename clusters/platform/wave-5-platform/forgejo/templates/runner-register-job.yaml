{{ $name := "forgejo-runner-register" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-forgejo
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/exec
    verbs:
      - get
      - list
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-forgejo
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-forgejo
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: forgejo-runner
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: forgejo-runner
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $name }}
      containers:
        - name: register
          image: docker.io/alpine/kubectl:1.35.2
          command:
            - sh
            - -c
            - |
              set -e

              echo "Waiting for Forgejo pod to be ready..."
              kubectl -n {{ .Release.Namespace }} wait --for=condition=ready pod -l app.kubernetes.io/name=forgejo --timeout=120s

              echo "Generating runner token..."
              TOKEN=$(kubectl -n {{ .Release.Namespace }} exec deploy/forgejo -c forgejo -- forgejo actions generate-runner-token)

              if [ -z "$TOKEN" ]; then
                echo "Failed to generate runner token"
                exit 1
              fi

              echo "Runner token generated successfully"

              echo "Saving runner token to forgejo-runner namespace..."
              cat <<EOJSON | kubectl apply -f -
              {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": {
                  "name": "forgejo-runner-credentials",
                  "namespace": "forgejo-runner"
                },
                "type": "Opaque",
                "stringData": {
                  "runner-secret": "$TOKEN"
                }
              }
              EOJSON

              echo "Runner token saved!"
  backoffLimit: 3
