apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-mirror
  namespace: minio
spec:
  schedule: "0 3 * * *" # todo dia às 3h
  concurrencyPolicy: Forbid # evita runs simultâneos
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mc
              image: minio/mc:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "Configurando aliases..."
                  mc alias set source http://minio.minio.svc.cluster.local:9000 \
                    "$SOURCE_ACCESS_KEY" "$SOURCE_SECRET_KEY"

                  mc alias set dest http://10.40.1.20:9000 \
                    "$DEST_ACCESS_KEY" "$DEST_SECRET_KEY"

                  echo "Criando buckets no destino se não existirem..."
                  for bucket in assets forgejo forgejo-backups postgres-backups velero; do
                    mc mb --ignore-existing "dest/$bucket"
                  done

                  echo "Iniciando mirror dos buckets..."
                  for bucket in assets forgejo forgejo-backups postgres-backups velero; do
                    echo "Espelhando bucket: $bucket"
                    mc mirror \
                      --overwrite \
                      --remove \
                      "source/$bucket" \
                      "dest/$bucket" || true
                    echo "Bucket $bucket concluído."
                  done

                  echo "Mirror concluído com sucesso!"
              env:
                - name: SOURCE_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-mirror-credentials
                      key: sourceAccessKey
                - name: SOURCE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-mirror-credentials
                      key: sourceSecretKey
                - name: DEST_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-mirror-credentials
                      key: destAccessKey
                - name: DEST_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-mirror-credentials
                      key: destSecretKey
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi