apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: minio-mirror
  namespace: argo-workflows
spec:
  schedules:
    - "0 3 * * *"
  timezone: "America/Sao_Paulo"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: mirror-all
    templates:
      - name: mirror-all
        dag:
          tasks:
            - name: mirror-assets
              template: mirror-bucket
              arguments:
                parameters:
                  - name: bucket
                    value: assets
            - name: mirror-forgejo
              template: mirror-bucket
              arguments:
                parameters:
                  - name: bucket
                    value: forgejo
            - name: mirror-forgejo-backups
              template: mirror-bucket
              arguments:
                parameters:
                  - name: bucket
                    value: forgejo-backups
            - name: mirror-postgres-backups
              template: mirror-bucket-large
              arguments:
                parameters:
                  - name: bucket
                    value: postgres-backups
            - name: mirror-velero
              template: mirror-bucket
              arguments:
                parameters:
                  - name: bucket
                    value: velero

      - name: mirror-bucket
        inputs:
          parameters:
            - name: bucket
        container:
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BUCKET="{{`{{inputs.parameters.bucket}}`}}"
              echo "Configurando aliases..."
              mc alias set source http://minio.minio.svc.cluster.local:9000 \
                "$SOURCE_ACCESS_KEY" "$SOURCE_SECRET_KEY"
              mc alias set dest http://10.40.1.20:9000 \
                "$DEST_ACCESS_KEY" "$DEST_SECRET_KEY"
              echo "Criando bucket $BUCKET no destino se nao existir..."
              mc mb --ignore-existing "dest/$BUCKET"
              echo "Espelhando bucket: $BUCKET"
              mc mirror --overwrite "source/$BUCKET" "dest/$BUCKET"
              echo "Bucket $BUCKET concluido."
          env:
            - name: SOURCE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: sourceAccessKey
            - name: SOURCE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: sourceSecretKey
            - name: DEST_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: destAccessKey
            - name: DEST_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: destSecretKey
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

      - name: mirror-bucket-large
        inputs:
          parameters:
            - name: bucket
        container:
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BUCKET="{{`{{inputs.parameters.bucket}}`}}"
              echo "Configurando aliases..."
              mc alias set source http://minio.minio.svc.cluster.local:9000 \
                "$SOURCE_ACCESS_KEY" "$SOURCE_SECRET_KEY"
              mc alias set dest http://10.40.1.20:9000 \
                "$DEST_ACCESS_KEY" "$DEST_SECRET_KEY"
              echo "Criando bucket $BUCKET no destino se nao existir..."
              mc mb --ignore-existing "dest/$BUCKET"
              echo "Espelhando bucket: $BUCKET"
              mc mirror --overwrite "source/$BUCKET" "dest/$BUCKET"
              echo "Bucket $BUCKET concluido."
          env:
            - name: SOURCE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: sourceAccessKey
            - name: SOURCE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: sourceSecretKey
            - name: DEST_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: destAccessKey
            - name: DEST_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mirror-credentials
                  key: destSecretKey
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
