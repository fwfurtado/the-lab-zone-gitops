apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: valkey-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /valkey/password
