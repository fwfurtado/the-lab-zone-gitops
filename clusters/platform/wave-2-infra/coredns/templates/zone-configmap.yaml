apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-zone
  namespace: dns
data:
  the-lab.zone: |
    $ORIGIN the-lab.zone.
    $TTL 300

    @ IN SOA dns.the-lab.zone. admin.the-lab.zone. (
          2024010101 ; serial
          3600       ; refresh
          900        ; retry
          604800     ; expire
          300 )      ; minimum

    @       IN NS  dns.the-lab.zone.
    dns     IN A   10.40.2.2

    ; Physical infrastructure
    proxmox IN A   10.40.0.200
    nas     IN A   10.40.0.4
    haos    IN A   192.168.20.2

    ; Cluster service wildcards — Traefik handles routing via IngressRoute
    *.platform  IN A   10.40.2.1
    *.infra     IN A   10.40.2.1
