proxmox-csi-plugin:
  # Cluster credentials come from SealedSecret "proxmox-csi-config"
  # (see templates/proxmox-csi-config-sealedsecret.yaml).
  # Regenerate with: make bootstrap-seal-proxmox-csi-config
  existingConfigSecret: proxmox-csi-config

  storageClasses:
    - name: proxmox-lvm
      defaultClass: true
      reclaimPolicy: Retain
      volumeBindingMode: WaitForFirstConsumer
      allowVolumeExpansion: true
      parameters:
        storage: local-ssd
        fstype: ext4
        cache: none
        ssd: "true"
