apiVersion: batch/v1
kind: Job
metadata:
  name: init-databases
  namespace: cloudnativepg
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: postgres:17-alpine
          env:
            - name: PGHOST
              value: platform-postgres-rw.cloudnativepg.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: platform-postgres-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-postgres-superuser
                  key: password
            - name: AUTHELIA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-credentials
                  key: authelia-password
            - name: FORGEJO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-credentials
                  key: forgejo-password
            - name: INFISICAL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-credentials
                  key: infisical-password
            - name: CODER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-credentials
                  key: coder-password
          command:
            - /bin/sh
            - -c
            - |
              set -e

              psql -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='authelia'" | grep -q 1 || \
                psql -d postgres -c "CREATE ROLE authelia WITH LOGIN PASSWORD '$AUTHELIA_DB_PASSWORD'"
              psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='authelia'" | grep -q 1 || \
                psql -d postgres -c "CREATE DATABASE authelia OWNER authelia"

              psql -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='forgejo'" | grep -q 1 || \
                psql -d postgres -c "CREATE ROLE forgejo WITH LOGIN PASSWORD '$FORGEJO_DB_PASSWORD'"
              psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='forgejo'" | grep -q 1 || \
                psql -d postgres -c "CREATE DATABASE forgejo OWNER forgejo"

              psql -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='infisical'" | grep -q 1 || \
                psql -d postgres -c "CREATE ROLE infisical WITH LOGIN PASSWORD '$INFISICAL_DB_PASSWORD'"
              psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='infisicalDB'" | grep -q 1 || \
                psql -d postgres -c "CREATE DATABASE \"infisicalDB\" OWNER infisical"

              psql -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='coder'" | grep -q 1 || \
                psql -d postgres -c "CREATE ROLE coder WITH LOGIN PASSWORD '$CODER_DB_PASSWORD'"
              psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='coder'" | grep -q 1 || \
                psql -d postgres -c "CREATE DATABASE coder OWNER coder"

              echo "Database initialization complete"
