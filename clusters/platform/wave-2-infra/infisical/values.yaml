infisical-standalone:
  infisical:
    enabled: true
    kubeSecretRef: infisical-secrets
    replicaCount: 1
    image:
      tag: "v0.151.0"
    resources:
      requests:
        cpu: 350m
        memory: 512Mi
      limits:
        memory: 1000Mi

  ingress:
    enabled: false
    nginx:
      enabled: false

  ingress-nginx:
    enabled: false

  postgresql:
    enabled: true
    fullnameOverride: infisical-postgresql
    image:
      registry: docker.io
      repository: bitnami/postgresql
      tag: "16"  # 16.2.0-debian-11-r17 was removed; use rolling tag
    primary:
      persistence:
        size: 8Gi
        storageClass: truenas-nfs
    auth:
      username: infisical
      password: infisical
      database: infisicalDB

  redis:
    enabled: true
    fullnameOverride: infisical-redis
    image:
      registry: docker.io
      repository: bitnami/redis
      tag: "7.2"  # 7.2.4-debian-11-r5 may be removed; use rolling tag
    architecture: standalone
    master:
      persistence:
        size: 2Gi
        storageClass: truenas-nfs
    auth:
      password: infisical-redis
