---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: infisical-pg-backup
  namespace: infisical
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: bitnami/postgresql:16
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  DUMP_FILE="/tmp/infisical-${TIMESTAMP}.sql.gz"
                  echo "Starting pg_dump at ${TIMESTAMP}"
                  PGPASSWORD="${PGPASSWORD}" pg_dump -h infisical-postgresql -U infisical -d infisicalDB | gzip > "${DUMP_FILE}"
                  echo "Uploading to MinIO..."
                  apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
                  curl -s -S --fail \
                    -X PUT \
                    -H "Host: minio.minio.svc.cluster.local:9000" \
                    --aws-sigv4 "aws:amz:us-east-1:s3" \
                    --user "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" \
                    --upload-file "${DUMP_FILE}" \
                    "http://minio.minio.svc.cluster.local:9000/postgres-backups/infisical/infisical-${TIMESTAMP}.sql.gz"
                  echo "Backup uploaded: infisical/infisical-${TIMESTAMP}.sql.gz"
                  rm -f "${DUMP_FILE}"
              env:
                - name: PGPASSWORD
                  value: "infisical"
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-backup-credentials
                      key: access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-backup-credentials
                      key: secret-key
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
