---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: infisical-pg-backup
  namespace: infisical
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: dump
              emptyDir: {}
          initContainers:
            - name: pg-dump
              image: mirror.gcr.io/bitnamilegacy/postgresql:16.2.0-debian-11-r16
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  echo "${TIMESTAMP}" > /dump/timestamp
                  DUMP_FILE="/dump/infisical-${TIMESTAMP}.sql.gz"
                  echo "Starting pg_dump at ${TIMESTAMP}"
                  PGPASSWORD="${PGPASSWORD}" pg_dump -h infisical-postgresql -U infisical -d infisicalDB | gzip > "${DUMP_FILE}"
                  echo "pg_dump complete: ${DUMP_FILE}"
              env:
                - name: PGPASSWORD
                  value: "infisical"
              volumeMounts:
                - name: dump
                  mountPath: /dump
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          containers:
            - name: upload
              image: quay.io/minio/mc:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  TIMESTAMP=$(cat /dump/timestamp)
                  DUMP_FILE="/dump/infisical-${TIMESTAMP}.sql.gz"
                  mc alias set backup http://minio.minio.svc.cluster.local:9000 "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
                  mc cp "${DUMP_FILE}" "backup/postgres-backups/infisical/infisical-${TIMESTAMP}.sql.gz"
                  echo "Backup uploaded: infisical/infisical-${TIMESTAMP}.sql.gz"
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-backup-credentials
                      key: access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-backup-credentials
                      key: secret-key
              volumeMounts:
                - name: dump
                  mountPath: /dump
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 128Mi
